<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Gradients -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0072ff" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="capTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#323236" />
      <stop offset="100%" stop-color="#1f1f22" />
    </linearGradient>
    <linearGradient id="capSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="100%" stop-color="#0e0e10" />
    </linearGradient>
  </defs>

  <!-- Ambient Cyan Glow -->
  <rect x="106" y="126" width="300" height="300" rx="72" fill="url(#glowGrad)" filter="url(#glow)" />

  <!-- 3D Keycap Casing / Bottom Side -->
  <rect x="96" y="106" width="320" height="300" rx="60" fill="url(#capSide)" />

  <!-- Keycap Top Face (Offset upwards for 3D depth) -->
  <rect x="112" y="96" width="288" height="260" rx="48" fill="url(#capTop)" stroke="#3e3e42" stroke-width="1.5" />

  <!-- Legend (Character '注') -->
  <text 
    x="256" 
    y="226" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" 
    font-size="128" 
    font-weight="900" 
    fill="#ffffff" 
    text-anchor="middle" 
    dominant-baseline="central"
  >注</text>

  <!-- Subtle keycap top highlight to enhance 3D realism -->
  <path d="M 136 108 L 376 108" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.08" />
</svg>